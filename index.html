<script>
const scene = document.getElementById("innerScene");
const bg = document.getElementById("bg");

let targetX=0,targetY=0,currentX=0,currentY=0;

const isMobile = window.innerWidth <= 768;

function update(x,y){
  const cx = window.innerWidth/2;
  const cy = window.innerHeight/2;

  const px = (x-cx)/cx;
  const py = (y-cy)/cy;

  targetX = isMobile ? 0 : px;
  targetY = py;
}

if(isMobile){
  document.addEventListener("touchmove",e=>{
    const t=e.touches[0];
    update(t.clientX,t.clientY);
  },{passive:true});
}else{
  document.addEventListener("mousemove",e=>{
    update(e.clientX,e.clientY);
  });
}

function animate(){

  currentX += (targetX-currentX)*0.06;
  currentY += (targetY-currentY)*0.06;

  if(isMobile){

    const rotX = currentY*11;
    const rotY = currentX*-8;

    scene.style.transform =
      `rotateX(${rotX}deg) rotateY(${rotY}deg)`;

    bg.style.transform =
      `translateY(${currentY*-35}px)
       translateX(${currentX*-25}px)
       scale(1.05)`;

  } else {

    scene.style.transform = `rotateX(0deg) rotateY(0deg)`;

    bg.style.transform =
      `translateY(${currentY*-25}px)
       translateX(${currentX*-20}px)
       scale(1.03)`;
  }

  requestAnimationFrame(animate);
}

animate();
</script>
